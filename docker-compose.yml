

# ============================================================
# VinaMilk Data Lakehouse - Local Infrastructure
# Stack: PostgreSQL (Mock SAP) + Kafka + Debezium + Schema Registry
# ============================================================

services:

  # ─────────────────────────────────────────────────────────
  # 1. ZOOKEEPER — Kafka Cluster Coordinator
  # ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: vinamik-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 10
      ZOOKEEPER_SYNC_LIMIT: 5
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 2. KAFKA BROKER — Message Broker (ERP events)
  # ─────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: vinamik-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"    # External access
      - "9101:9101"    # JMX metrics
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 100
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      # Topic auto-creation & retention
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168       # 7 days default
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_MESSAGE_MAX_BYTES: 10485760    # 10MB max message
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 3. SCHEMA REGISTRY — Avro Schema Storage
  # ─────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: vinamik-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 4. POSTGRESQL 15 — Mock SAP S/4HANA ERP Database
  # WAL logical replication enabled for Debezium CDC
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vinamik-postgres
    hostname: postgres
    # wal_level=logical is REQUIRED for Debezium WAL tailing
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
      -c wal_sender_timeout=0
      -c shared_preload_libraries=pgoutput
      -c log_min_duration_statement=2000
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vinamik_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vinamik@2024
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vinamik_erp"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 5. DEBEZIUM CONNECT — CDC Connector
  # Reads PostgreSQL WAL → Publishes to Kafka topics
  # ─────────────────────────────────────────────────────────
  debezium-connect:
    image: debezium/connect:2.4
    container_name: vinamik-debezium
    hostname: debezium-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-vinamik-group
      CONFIG_STORAGE_TOPIC: _debezium_vinamik_configs
      OFFSET_STORAGE_TOPIC: _debezium_vinamik_offsets
      STATUS_STORAGE_TOPIC: _debezium_vinamik_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Use JSON (no Avro dependency) for simpler local dev
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      # Cho phép ghi đè cấu hình producer (để kết nối Azure Event Hubs)
      CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY: All
      # Heartbeat to detect idle connections
      HEARTBEAT_INTERVAL_MS: 10000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 6. KAFKA UI — Web UI for monitoring topics & messages
  # Access at http://localhost:8080
  # ─────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vinamik-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      debezium-connect:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vinamik-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium-connect:8083
      
      # Tích hợp Azure Event Hubs Dashboard
      KAFKA_CLUSTERS_1_NAME: azure-cloud-eventhubs
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: vnm-eventhubs-2024.servicebus.windows.net:9093
      KAFKA_CLUSTERS_1_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_CLUSTERS_1_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_1_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="$$ConnectionString" password="${EVENT_HUBS_CONNECTION_STRING}";'
      
      DYNAMIC_CONFIG_ENABLED: 'true'
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 7. DATA GENERATOR — Mock SAP ERP Transaction Producer
  # Writes to PostgreSQL → Debezium captures → Kafka
  # ─────────────────────────────────────────────────────────
  data-generator:
    build:
      context: .
      dockerfile: data_generator/Dockerfile
    container_name: vinamik-data-generator
    hostname: data-generator
    depends_on:
      postgres:
        condition: service_healthy
      debezium-connect:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: vinamik_erp
      POSTGRES_USER: postgres
      POSTGRES_PASS: vinamik@2024
      LOG_LEVEL: INFO
    # Speed options: slow | normal | fast | burst
    command: ["python", "generate_erp_data.py", "--speed", "normal"]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 8. BRONZE STREAMING — PySpark Job (Event Hubs → ADLS Gen2)
  # Reads ALL topics from Azure Event Hubs and writes Delta
  # tables to Azure Data Lake Storage Gen2 (Bronze layer).
  # ─────────────────────────────────────────────────────────
  bronze-streaming:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: vinamik-bronze-streaming
    depends_on:
      kafka:
        condition: service_healthy
      debezium-connect:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 9. MISA CSV PRODUCER — Dalat Milk & Moc Chau batch (daily 06:00)
  # Simulates MISA SME software exporting CSV → Kafka
  # Topic: erp.misa_invoices
  # ─────────────────────────────────────────────────────────
  misa-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: vinamik-misa-producer
    hostname: misa-producer
    depends_on:
      debezium-connect:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP: ${EVENT_HUBS_NAMESPACE}.servicebus.windows.net:9093
      MISA_CSV_DIR: /data/misa_exports
      LOG_LEVEL: INFO
    volumes:
      - misa_csv_data:/data/misa_exports
    command: ["python", "misa_csv_producer.py", "--loop"]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 10. FX RATE PRODUCER — SBV exchange rates every hour
  # Simulates VinaMilk Treasury polling SBV rates
  # Topic: erp.fx_rates
  # ─────────────────────────────────────────────────────────
  fx-rate-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: vinamik-fx-producer
    hostname: fx-rate-producer
    depends_on:
      debezium-connect:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP: ${EVENT_HUBS_NAMESPACE}.servicebus.windows.net:9093
      FX_POLL_INTERVAL_SECONDS: 3600
      # EXCHANGE_RATE_API_KEY: ""   ← để trống = dùng mock rates
      LOG_LEVEL: INFO
    command: ["python", "fx_rate_producer.py", "--loop", "--mock"]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 11. BUDGET PLAN PRODUCER — Google Sheets Finance Planning (every 5 min)
  # Simulates phòng KH-TC cập nhật ngân sách trên Google Sheets
  # Topic: erp.budget_plan
  # ─────────────────────────────────────────────────────────
  budget-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: vinamik-budget-producer
    hostname: budget-producer
    depends_on:
      debezium-connect:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP: ${EVENT_HUBS_NAMESPACE}.servicebus.windows.net:9093
      BUDGET_POLL_INTERVAL: 300
      LOG_LEVEL: INFO
    # Backfill 12 tháng lần đầu, sau đó loop mỗi 5 phút
    command: >
      sh -c "python budget_plan_producer.py --backfill &&
             python budget_plan_producer.py --loop"
    restart: unless-stopped

# ─────────────────────────────────────────────────────────
# VOLUMES — Persistent data storage

# ─────────────────────────────────────────────────────────
volumes:
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  postgres_data:
    driver: local
  misa_csv_data:
    driver: local

# ─────────────────────────────────────────────────────────
# NETWORK — Isolated network for all services
# ─────────────────────────────────────────────────────────
networks:
  default:
    name: vinamik-lakehouse-network
    driver: bridge

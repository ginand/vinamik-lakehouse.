# ============================================================
# VinaMilk Data Lakehouse - Local Infrastructure
# Stack: PostgreSQL (Mock SAP) + Kafka + Debezium + Schema Registry
# ============================================================

# ─────────────────────────────────────────────────────────
# YAML ANCHORS — Dùng chung cho 3 Airflow services (DRY)
# ─────────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Dùng IP tĩnh của postgres (172.20.0.10) thay vì hostname để tránh lỗi DNS resolution
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:1@172.20.0.10/airflow_db
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'vinamik-secret-2024'
    AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
    AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
    EVENT_HUBS_CONNECTION_STRING: ${EVENT_HUBS_CONNECTION_STRING}
  volumes:
    - airflow_data:/opt/airflow
    - ./dags:/opt/airflow/dags
    - ./spark:/opt/spark-jobs
    - ./dbt_gold:/opt/dbt_gold

services:

  # ─────────────────────────────────────────────────────────
  # 4. POSTGRESQL 15 — Mock SAP S/4HANA ERP Database
  # WAL logical replication enabled for Debezium CDC
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vinamik-postgres
    hostname: postgres
    # wal_level=logical is REQUIRED for Debezium WAL tailing
    command: >
      postgres -c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10 -c wal_sender_timeout=0 -c shared_preload_libraries=pgoutput -c log_min_duration_statement=2000
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vinamik_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vinamik@2024} # FIX: Ưu tiên từ .env
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      default:
        ipv4_address: 172.20.0.10 # IP tĩnh — Airflow kết nối qua IP này, không qua DNS hostname
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d vinamik_erp" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 5. DEBEZIUM CONNECT — CDC Connector (STANDALONE MODE)
  # Reads PostgreSQL WAL → Publishes to Azure Event Hubs directly
  # ─────────────────────────────────────────────────────────
  debezium-connect:
    image: debezium/connect:2.4
    container_name: vinamik-debezium
    hostname: debezium-connect
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./debezium-standalone:/kafka/config/standalone
      - debezium_data:/debezium/data
    user: root
    entrypoint: >
      bash -c " mkdir -p /debezium/data && chown -R kafka:kafka /debezium/data && sed \"s|__EH_NAMESPACE__|$$EVENT_HUBS_NAMESPACE|g; s|__EH_CONN_STR__|$$EVENT_HUBS_CONNECTION_STRING|g\" /kafka/config/standalone/worker.properties.template > /tmp/worker.properties && chown kafka:kafka /tmp/worker.properties && su -s /bin/bash kafka -c '/kafka/bin/connect-standalone.sh /tmp/worker.properties /kafka/config/standalone/connector.properties' "
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 7. DATA GENERATOR — Mock SAP ERP Transaction Producer
  # Writes to PostgreSQL → Debezium captures → Kafka
  # ─────────────────────────────────────────────────────────
  data-generator:
    build:
      context: .
      dockerfile: data_generator/Dockerfile
    container_name: vinamik-data-generator
    hostname: data-generator
    depends_on:
      postgres:
        condition: service_healthy
      debezium-connect:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: vinamik_erp
      POSTGRES_USER: postgres
      POSTGRES_PASS: ${POSTGRES_PASSWORD:-vinamik@2024}
      LOG_LEVEL: INFO
    # Speed options: slow | normal | fast | burst
    command: [ "python", "generate_erp_data.py", "--speed", "normal" ]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 8. BRONZE STREAMING — PySpark Job (Event Hubs → ADLS Gen2)
  # Reads ALL topics from Azure Event Hubs and writes Delta
  # tables to Azure Data Lake Storage Gen2 (Bronze layer).
  # ─────────────────────────────────────────────────────────
  bronze-streaming:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: vinamik-bronze-streaming
    depends_on:
      debezium-connect:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 9. MISA CSV PRODUCER — Dalat Milk & Moc Chau batch (daily 06:00)
  # Simulates MISA SME software exporting CSV → Kafka
  # Topic: erp.misa_invoices
  # ─────────────────────────────────────────────────────────
  misa-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: vinamik-misa-producer
    hostname: misa-producer
    depends_on:
      debezium-connect:
        condition: service_started
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP: ${EVENT_HUBS_NAMESPACE}.servicebus.windows.net:9093
      MISA_CSV_DIR: /data/misa_exports
      LOG_LEVEL: INFO
    volumes:
      - misa_csv_data:/data/misa_exports
    command: [ "python", "misa_csv_producer.py", "--loop" ]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 10. FX RATE PRODUCER — SBV exchange rates every hour
  # Simulates VinaMilk Treasury polling SBV rates
  # Topic: erp.fx_rates
  # ─────────────────────────────────────────────────────────
  fx-rate-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: vinamik-fx-producer
    hostname: fx-rate-producer
    depends_on:
      debezium-connect:
        condition: service_started
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP: ${EVENT_HUBS_NAMESPACE}.servicebus.windows.net:9093
      FX_POLL_INTERVAL_SECONDS: 3600
      # EXCHANGE_RATE_API_KEY: ""   ← để trống = dùng mock rates
      LOG_LEVEL: INFO
    command: [ "python", "fx_rate_producer.py", "--loop" ]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 11. BUDGET PLAN PRODUCER — Google Sheets Finance Planning (every 5 min)
  # Simulates phòng KH-TC cập nhật ngân sách trên Google Sheets
  # Topic: erp.budget_plan
  # ─────────────────────────────────────────────────────────
  budget-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: vinamik-budget-producer
    hostname: budget-producer
    depends_on:
      debezium-connect:
        condition: service_started
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP: ${EVENT_HUBS_NAMESPACE}.servicebus.windows.net:9093
      BUDGET_POLL_INTERVAL: 300
      LOG_LEVEL: INFO
    # Backfill 12 tháng lần đầu, sau đó loop mỗi 5 phút
    command: >
      sh -c "python budget_plan_producer.py --backfill &&
             python budget_plan_producer.py --loop"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 12. AIRFLOW INIT — Khởi tạo database Airflow lần đầu
  # ─────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: vinamik-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@vinamik.local"
    restart: on-failure

  # ─────────────────────────────────────────────────────────
  # 13. AIRFLOW SCHEDULER — Đọc DAG, bấm lịch chạy
  # ─────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: vinamik-airflow-scheduler
    depends_on:
      - airflow-init
    command: airflow scheduler
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # 14. AIRFLOW WEBSERVER — UI theo dõi DAG tại localhost:8888
  # ─────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: vinamik-airflow-webserver
    depends_on:
      - airflow-scheduler
    ports:
      - "8888:8080" # Airflow UI: http://localhost:8888
    command: airflow webserver
    restart: unless-stopped

# ─────────────────────────────────────────────────────────
# VOLUMES — Persistent data storage
# ─────────────────────────────────────────────────────────
volumes:
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  postgres_data:
    driver: local
  misa_csv_data:
    driver: local
  airflow_data:
    driver: local
  debezium_data:
    driver: local

# ─────────────────────────────────────────────────────────
# NETWORK — Isolated network for all services
# ─────────────────────────────────────────────────────────
networks:
  default:
    name: vinamik-lakehouse-network
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450 # Tránh packet fragmentation trong WSL2
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24 # Subnet tĩnh — IP không đổi sau mỗi restart
          gateway: 172.20.0.1

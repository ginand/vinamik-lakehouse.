name: VinaMilk Lakehouse CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit_tests:
    name: PySpark Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # PySpark yêu cầu Java 11+
      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "11"

      # Cache Maven để tránh re-download Delta JARs mỗi lần CI chạy
      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-delta-3.2.1
          restore-keys: ${{ runner.os }}-maven-

      - uses: actions/setup-python@v4
        with: { python-version: "3.11" }

      - name: Install dependencies
        run: pip install pyspark==3.5.3 delta-spark==3.2.1 pytest pytest-cov

      - name: Run PySpark Tests
        env:
          AZURE_STORAGE_ACCOUNT_NAME: "test_account"
          AZURE_STORAGE_ACCOUNT_KEY: "dGVzdF9rZXk="
          JAVA_HOME: ${{ env.JAVA_HOME }}
          SPARK_LOCAL_IP: "127.0.0.1"
          PYSPARK_PYTHON: python3
        timeout-minutes: 10
        run: |
          python -m pytest tests/ -v \
            --cov=spark \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=15

  dbt_tests:
    name: dbt Schema Tests (compile-only)
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with: { python-version: "3.11" }

      - name: Install dbt
        run: pip install dbt-duckdb

      - name: Run dbt compile (schema check, no Azure connection needed)
        env:
          AZURE_STORAGE_ACCOUNT_NAME: "ci_test_account"
          AZURE_STORAGE_ACCOUNT_KEY: "dGVzdF9rZXk="
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=ci_test_account;AccountKey=dGVzdF9rZXk=;EndpointSuffix=core.windows.net"
        run: |
          cd dbt_gold/
          dbt deps
          dbt parse --profiles-dir .

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [unit_tests, dbt_tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy Airflow DAGs to Azure Blob
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY:     ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          # Create container if it doesn't exist
          az storage container create \
            --name airflow-dags \
            --account-name $AZURE_STORAGE_ACCOUNT \
            --account-key $AZURE_STORAGE_KEY \
            --output none || true

          # Upload all DAGs
          az storage blob upload-batch \
            --account-name $AZURE_STORAGE_ACCOUNT \
            --account-key  $AZURE_STORAGE_KEY \
            --destination  airflow-dags \
            --source       dags/


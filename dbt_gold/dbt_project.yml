name: vinamik_gold
version: '1.0.0'
config-version: 2

profile: vinamik-gold

model-paths: ["models"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Biến môi trường dùng trong models
vars:
  storage_account: "{{ env_var('AZURE_STORAGE_ACCOUNT_NAME', 'vmlakehouse2024') }}"
  storage_key: "{{ env_var('AZURE_STORAGE_ACCOUNT_KEY', '') }}"
  silver_container: "silver"
  gold_container: "gold"

# ─── Tạo Azure Secret cho delta-kernel-rs trước khi chạy models ───────────
# delta extension dùng delta-kernel-rs (Rust), không đọc DuckDB settings.
# Phải tạo SECRET để delta_scan() có thể xác thực với ADLS Gen2.
on-run-start:
  - "SET CA_CERT_FILE='/etc/ssl/certs/ca-certificates.crt';"
  - "CREATE OR REPLACE SECRET vinamik_azure_secret (
        TYPE AZURE,
        CONNECTION_STRING '{{ env_var(\"AZURE_STORAGE_CONNECTION_STRING\") }}'
     );"

models:
  vinamik_gold:
    +materialized: external   # Ghi file Delta ra ADLS Gen2 thay vì bảng DuckDB tạm
    +tags: ["gold"]

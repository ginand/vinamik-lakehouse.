vinamik-gold:
  outputs:
    dev:
      type: duckdb
      path: ":memory:"
      extensions:
        - httpfs
        - delta
        - azure
      settings:
        # Giới hạn RAM cho DuckDB để tránh gây treo máy (OOM trên WSL)
        memory_limit: "1GB"
        # Bắt buộc chỉ định file CA Cert trên Linux để DuckDB/Azure không bị lỗi SSL
        ca_cert_file: "/etc/ssl/certs/ca-certificates.crt"
      setup:
        - "SET CA_CERT_FILE='/etc/ssl/certs/ca-certificates.crt';"
        # ─── Azure Auth via Secrets Manager (DuckDB >= 1.0) ─────────
      secrets:
        - type: azure
          provider: config
          connection_string: "{{ env_var('AZURE_STORAGE_CONNECTION_STRING') | replace('https', 'http') }}"
  target: dev

